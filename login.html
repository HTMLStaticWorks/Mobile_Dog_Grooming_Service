<!DOCTYPE html>
<html lang="en" dir="ltr" data-no-rtl>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Paws & Bubbles</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body style="background: var(--surface-alt); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative;">



  <!-- Login Card -->
  <div class="card fade-in-up appear" style="max-width: 450px; width: 100%; padding: 3rem; background: var(--surface); box-shadow: var(--shadow-xl); border: none; border-radius: 30px;">
    <div class="text-center" style="margin-bottom: 2.5rem;">
      <a href="index.html" class="navbar-brand" style="justify-content: center; margin-bottom: 1.5rem; font-size: 1.5rem;">
        <i class="fas fa-paw"></i>
        <span>Paws & Bubbles</span>
      </a>
      <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome Back</h1>
      <p style="color: var(--text-muted); font-size: 0.875rem;">Enter your credentials to manage your pet's spa days.</p>
    </div>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="hello@pawsandbubbles.com" required style="background: var(--surface-alt);">
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <label class="form-label" style="margin-bottom: 0;">Password</label>
          <a href="coming-soon.html" style="font-size: 0.75rem; color: var(--primary); text-decoration: none;">Forgot password?</a>
        </div>
        <input type="password" class="form-control" placeholder="••••••••" required style="background: var(--surface-alt);">
      </div>

      <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="remember" style="accent-color: var(--primary);">
        <label for="remember" style="font-size: 0.875rem; cursor: pointer;">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1rem; border-radius: var(--radius-full);">Sign In</button>
    </form>

    <div class="text-center" style="margin-top: 2rem;">
      <p style="font-size: 0.875rem;">Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Create One</a></p>
    </div>

  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
