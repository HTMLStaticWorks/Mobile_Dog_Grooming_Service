<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Paws & Bubbles</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body style="background: var(--surface-alt); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">

  <!-- Sign Up Card -->
  <div class="card fade-in-up appear" style="max-width: 500px; width: 100%; padding: 3rem; background: var(--surface); box-shadow: var(--shadow-xl); border: none; border-radius: 30px;">
    <div class="text-center" style="margin-bottom: 2.5rem;">
      <a href="index.html" class="navbar-brand" style="justify-content: center; margin-bottom: 1.5rem; font-size: 1.5rem;">
        <i class="fas fa-paw"></i>
        <span>Paws & Bubbles</span>
      </a>
      <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Create Your Account</h1>
      <p style="color: var(--text-muted); font-size: 0.875rem;">Join the pack and start booking spa days for your pet.</p>
    </div>

    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="grid grid-2" style="gap: 1rem; margin-bottom: 1.5rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" placeholder="John" required style="background: var(--surface-alt);">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" placeholder="Doe" required style="background: var(--surface-alt);">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="hello@pawsandbubbles.com" required style="background: var(--surface-alt);">
      </div>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required style="background: var(--surface-alt);">
        <p style="font-size: 0.75rem; margin-top: 0.5rem;">At least 8 characters long</p>
      </div>

      <div style="margin-bottom: 2rem; display: flex; align-items: flex-start; gap: 0.5rem;">
        <input type="checkbox" id="terms" required style="margin-top: 0.25rem; accent-color: var(--primary);">
        <label for="terms" style="font-size: 0.875rem; cursor: pointer;">I agree to the <a href="coming-soon.html" style="color: var(--primary); text-decoration: underline;">Terms of Service</a> and <a href="coming-soon.html" style="color: var(--primary); text-decoration: underline;">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1rem; border-radius: var(--radius-full);">Create Account</button>
    </form>

    <div class="text-center" style="margin-top: 2rem;">
      <p style="font-size: 0.875rem;">Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Sign In</a></p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
